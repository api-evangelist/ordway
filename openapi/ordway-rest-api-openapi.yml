openapi: 3.0.3
info:
  title: Ordway REST API
  description: >-
    RESTful API for bidirectional integration with the Ordway billing and revenue
    automation platform. Enables managing customers, subscriptions, invoices,
    payments, usage data, and revenue recognition schedules. Supports usage-based
    billing, ASC 606 compliant revenue recognition, accounts receivable automation,
    and SaaS metrics reporting.
  version: v1
  contact:
    name: Ordway Support
    url: https://support.ordwaylabs.com
  termsOfService: https://ordwaylabs.com/
externalDocs:
  description: Ordway API Documentation
  url: https://ordwaylabs.stoplight.io/docs/ordway/ZG9jOjQ4OTgxNg-overview
servers:
  - url: https://api.ordwaylabs.com/api/v1
    description: Production
  - url: https://staging.ordwaylabs.com/api/v1
    description: Staging
security:
  - ApiKeyAuth: []
    UserTokenAuth: []
    UserEmailAuth: []
    CompanyAuth: []
tags:
  - name: Customers
    description: Manage billing customers and their contacts, notes, and payment methods
  - name: Subscriptions
    description: Manage subscription lifecycle and charges
  - name: Invoices
    description: Manage invoices and billing
  - name: Payments
    description: Manage payments and payment methods
  - name: Payment Runs
    description: Automated payment run management
  - name: Products
    description: Manage products and plans
  - name: Plans
    description: Manage billing plans and charges
  - name: Orders
    description: Manage one-time orders
  - name: Credits
    description: Manage customer credits
  - name: Refunds
    description: Manage payment refunds
  - name: Debit Memos
    description: Manage debit memos
  - name: Billing Runs
    description: Automated billing run management
  - name: Billing Schedules
    description: Manage billing schedules
  - name: Revenue Schedules
    description: Manage ASC 606 revenue recognition schedules
  - name: Revenue Rules
    description: Manage revenue recognition rules
  - name: Statements
    description: Customer account statements
  - name: Coupons
    description: Manage discount coupons
  - name: Usages
    description: Manage usage-based billing records
  - name: Chart of Accounts
    description: Manage general ledger chart of accounts
  - name: Journal Entries
    description: Manage accounting journal entries
  - name: Webhooks
    description: Manage webhook configurations

paths:
  /customers:
    get:
      summary: List customers
      operationId: listCustomers
      tags: [Customers]
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - $ref: '#/components/parameters/sort'
      responses:
        '200':
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Customer'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Create a customer
      operationId: createCustomer
      tags: [Customers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerInput'
      responses:
