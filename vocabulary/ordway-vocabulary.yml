vocabulary:
  provider: ordway
  description: >-
    Domain vocabulary for the Ordway billing and revenue automation platform,
    covering SaaS subscription billing, ASC 606 revenue recognition, accounts
    receivable, and financial reporting concepts.
  terms:
    - term: customer
      definition: >-
        An account representing a billing entity. Customers can have
        subscriptions, invoices, payments, credits, and contacts.
      properties:
        - customer_id
        - name
        - status
        - balance
        - cmrr
        - carr
        - auto_pay
        - currency
        - payment_terms
        - billing_cycle_day
      related:
        - subscription
        - invoice
        - payment
        - contact
        - credit

    - term: subscription
      definition: >-
        A recurring billing agreement between a customer and the provider,
        consisting of one or more subscription lines each tied to a charge.
        Subscriptions drive recurring invoice generation.
      properties:
        - subscription_id
        - subscription_line_id
        - customer_id
        - status
        - billing_start_date
        - service_start_date
        - cancellation_date
        - auto_renew
        - cmrr
        - billing_period
        - contract_term
        - renewal_term
        - pricing_model
        - charge_type
        - quantity
        - effective_price
      related:
        - customer
        - charge
        - plan
        - invoice
        - billing_schedule
        - revenue_schedule

    - term: invoice
      definition: >-
        A financial document issued to a customer for amounts owed. Invoices
        are generated by billing runs and contain line items tied to
        subscription charges or one-time orders.
      properties:
        - invoice_id
        - invoice_line_no
        - customer_id
        - invoice_date
        - due_date
        - invoice_amount
        - paid_amount
        - balance
        - status
        - currency
        - payment_terms
        - invoice_pdf_url
      related:
        - customer
        - subscription
        - payment
        - billing_run
        - credit
        - debit_memo

    - term: payment
      definition: >-
        A financial transaction recording money received from a customer
        against one or more invoices. Payments can be applied automatically
        or manually allocated.
      properties:
        - payment_id
        - customer_id
        - payment_date
        - payment_amount
        - applied_amount
        - unapplied_amount
        - refunded_amount
        - payment_type
        - payment_method
        - status
        - currency
        - reference_number
        - auto_apply
      related:
        - customer
        - invoice
        - refund
        - payment_run
        - payment_method

    - term: payment_run
      definition: >-
        An automated batch process that collects payments from customers
        with outstanding balances using their saved payment methods.
      properties:
        - payment_run_id
        - status
        - target_date
        - success_count
        - failure_count
        - payments_total_value
        - payments_success_value
        - payments_failed_value
        - currency
      related:
        - payment
        - refund

    - term: plan
      definition: >-
        A reusable billing template that groups one or more charges defining
        pricing, billing frequency, and usage rules for a product offering.
      properties:
        - plan_id
        - name
        - description
        - status
        - public_url
      related:
        - charge
        - product
        - subscription

    - term: charge
      definition: >-
        A pricing component within a plan that defines how a specific fee
        is billed — including type (recurring, one-time, usage), pricing
        model (flat, tiered, volume), and billing period.
      properties:
        - charge_id
        - plan_id
        - product_id
        - name
        - type
        - timing
        - pricing_model
        - list_price
        - billing_period
        - billing_day
        - unit_of_measure
        - charge_timing
      related:
        - plan
        - product
        - subscription
        - usage

    - term: product
      definition: >-
        A sellable item or service that can be associated with plans and
        charges. Products carry revenue recognition settings and GL mappings.
      properties:
        - product_id
        - name
        - sku
        - status
        - taxable
        - price
        - currency
        - deferred_revenue_enabled
        - revenue_rule_id
        - income_account
      related:
        - plan
        - charge
        - revenue_schedule

    - term: order
      definition: >-
        A one-time purchase transaction for non-subscription products or
        services, resulting in an invoice.
      properties:
        - order_id
        - order_line_no
        - customer_id
        - order_date
        - status
        - order_amount
        - currency
        - product_id
        - quantity
      related:
        - customer
        - invoice
        - product

    - term: credit
      definition: >-
        A credit memo issued to a customer representing a reduction in
        amounts owed. Credits can be applied to invoices or refunded.
      properties:
        - credit_id
        - customer_id
        - credit_date
        - credit_amount
        - applied_amount
        - unapplied_amount
        - status
        - currency
        - credit_number
        - credit_pdf_url
      related:
        - customer
        - invoice
        - refund
        - debit_memo

    - term: refund
      definition: >-
        A reversal of a previously collected payment returned to the customer,
        typically via the original payment method.
      properties:
        - refund_id
        - customer_id
        - refund_date
        - refund_amount
        - refund_type
        - refund_status
        - payment_id
        - currency
      related:
        - payment
        - customer

    - term: debit_memo
      definition: >-
        A document issued to a customer increasing the amount they owe,
        often used for adjustments or additional charges after an invoice.
      properties:
        - debit_memo_id
        - customer_id
        - debit_date
        - debit_amount
        - balance
        - paid_amount
        - status
        - currency
        - debit_pdf_url
      related:
        - customer
        - invoice
        - credit

    - term: billing_run
      definition: >-
        An automated batch process that generates invoices for customers
        with subscriptions due for billing on or before a target date.
      properties:
        - billing_run_id
        - status
        - target_date
        - invoice_date
        - invoices_total
        - invoices_count
        - currency
        - charge_type
      related:
        - invoice
        - subscription

    - term: billing_schedule
      definition: >-
        A forward-looking view of when subscription charges will be billed,
        showing scheduled billing dates and amounts for a subscription line.
      properties:
        - billing_schedule_id
        - customer_id
        - subscription_id
        - charge_id
        - start_date
        - end_date
        - monthly_recurring_revenue
        - annual_contract_revenue
        - total_contract_revenue
        - amount_invoiced
        - schedule_lines
      related:
        - subscription
        - customer
        - charge

    - term: revenue_schedule
      definition: >-
        An ASC 606 compliant revenue recognition schedule that distributes
        deferred revenue across recognition periods for a transaction.
      properties:
        - revenue_schedule_id
        - customer_id
        - source_transaction
        - product_id
        - charge_id
        - total_revenue
        - recognized_revenue
        - unrecognized_revenue
        - start_date
        - end_date
        - schedule_lines
      related:
        - product
        - subscription
        - invoice
        - revenue_rule

    - term: revenue_rule
      definition: >-
        A configuration defining how and when revenue should be recognized
        for a product or charge, supporting various recognition methods
        including straight-line, event-based, and custom schedules.
      properties:
        - revenue_rule_id
        - name
        - recognition_method
        - recognition_schedule_period
        - posting_day
        - posting_method
        - status
        - recognition_term
        - revenue_rule_entries
      related:
        - product
        - revenue_schedule

    - term: statement
      definition: >-
        A periodic account summary document for a customer listing
        transactions, balances, and payment history over a date range.
      properties:
        - statement_id
        - customer_id
        - statement_date
        - start_date
        - end_date
        - template_name
        - url
      related:
        - customer
        - invoice
        - payment

    - term: coupon
      definition: >-
        A discount code that can be applied to subscriptions to reduce
        billing amounts, supporting percentage and fixed-amount discounts
        with configurable duration and expiration.
      properties:
        - coupon_id
        - code
        - display_text
        - status
        - discount_type
        - discount_value
        - duration_period
        - expiration_date
        - usage_limit
        - usage_count
      related:
        - subscription
        - invoice

    - term: usage
      definition: >-
        A consumption record for a usage-based charge, recording the
        quantity consumed by a customer for a specific subscription line
        during a time period, used for metered billing calculations.
      properties:
        - usage_id
        - customer_id
        - subscription_id
        - subscription_line_id
        - charge_id
        - quantity
        - date
        - unit_of_measure
        - description
        - invoiced
      related:
        - subscription
        - charge
        - invoice

    - term: contact
      definition: >-
        A person associated with a customer account, used as billing or
        shipping contact. Contacts store address and communication details.
      properties:
        - contact_id
        - customer_id
        - display_name
        - first_name
        - last_name
        - email
        - phone
        - address1
        - city
        - state
        - zip
        - country
      related:
        - customer

    - term: payment_method
      definition: >-
        A stored payment instrument (credit card, ACH bank account, etc.)
        associated with a customer and used for automatic payment collection.
      properties:
        - payment_method_id
        - customer_id
        - payment_type
        - account_number
        - routing_number
        - account_holder_name
        - expiry
        - status
        - default
      related:
        - customer
        - payment

    - term: chart_of_account
      definition: >-
        A general ledger account entry in the company's chart of accounts,
        used for mapping revenue, deferred revenue, receivables, and other
        financial transactions.
      properties:
        - code
        - name
        - account_type
        - sub_type
        - parent_account
        - status
        - description
      related:
        - journal_entry
        - product
        - payment

    - term: journal_entry
      definition: >-
        An accounting journal entry recording financial transactions in the
        general ledger, generated automatically by billing and revenue events.
      properties:
        - journal_entry_id
        - company_id
      related:
        - chart_of_account
        - invoice
        - payment
        - revenue_schedule

    - term: webhook
      definition: >-
        A configured HTTP endpoint that receives event notifications from
        Ordway when specific billing or subscription events occur.
      properties:
        - name
        - url
        - status
        - events
        - headers
      related: []

    - term: cmrr
      definition: >-
        Contracted Monthly Recurring Revenue - the normalized monthly
        value of all active subscription contracts.
      related:
        - customer
        - subscription

    - term: carr
      definition: >-
        Contracted Annual Recurring Revenue - the annualized value of
        all active subscription contracts.
      related:
        - customer
        - subscription

    - term: asc_606
      definition: >-
        Accounting Standards Codification Topic 606, Revenue from Contracts
        with Customers - the US GAAP standard for revenue recognition that
        Ordway's revenue schedules are designed to support.
      related:
        - revenue_schedule
        - revenue_rule

    - term: pricing_model
      definition: >-
        The method used to calculate charge amounts. Common models include
        flat fee, per unit, tiered, volume, and usage-based.
      values:
        - flat_fee
        - per_unit
        - tiered
        - volume
        - usage_based
      related:
        - charge
        - subscription

    - term: billing_period
      definition: >-
        The frequency at which a recurring charge is billed (e.g., monthly,
        quarterly, annually).
      values:
        - monthly
        - quarterly
        - semi_annual
        - annual
        - one_time
      related:
        - charge
        - subscription
